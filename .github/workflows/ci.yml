name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        run: pytest tests/ -q --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          fail_ci_if_error: false

  build-image:
    name: Build Docker Image
    needs: lint-and-test
    runs-on: ubuntu-latest
    # Verify the production image builds cleanly on every PR — no push.
    steps:
      - uses: actions/checkout@v4

      - name: Build production image
        run: docker build --target runtime -t uscheduler:${{ github.sha }} ./backend
